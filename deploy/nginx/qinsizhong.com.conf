server {
    server_name qinsizhong.com www.qinsizhong.com;

    root /var/www/qsz_academic/current;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|ttf|otf|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/qinsizhong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qinsizhong.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name qinsizhong.com www.qinsizhong.com;
    return 301 https://$host$request_uri;
}
